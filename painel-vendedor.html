<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Vendedor - Clube de Fidelidade</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="container">
        <h2>Painel do Vendedor</h2>
        <p>Gerencie os pontos e compras dos clientes abaixo.</p>

        <div id="secao-busca">
            <div class="form-group">
                <label for="busca-codigo">Código do Cliente:</label>
                <input type="text" id="busca-codigo" placeholder="Ex: CLI123456">
            </div>
            <button type="button" id="btn-buscar">Buscar Cliente</button>
        </div>

        <div id="dados-cliente" class="hidden">
            <div class="perfil-cliente">
                <h3 id="cliente-nome">---</h3>
                <p id="cliente-info">---</p>
                
                <div class="saldo-box">
                    <span>Saldo Acumulado:</span>
                    <strong id="cliente-saldo">R$ 0.00</strong>
                </div>
                
                <p id="cliente-status-premio" style="font-weight: bold; margin-top: 10px;"></p>

                <button type="button" id="btn-resgatar-premio" class="hidden" style="background-color: #9b59b6; color: white; margin: 10px 0; width: 100%;">
                 🎁 Confirmar Entrega do Prêmio (Zerar Saldo)
                </button>
            </div>

            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

            <form id="form-lancar-compra">
                <div class="form-group">
                    <label for="cupom-compra">Número do Cupom / Venda:</label>
                    <input type="text" id="cupom-compra" required placeholder="Digite o código do cupom do caixa">
                </div>

                <div class="form-group">
                    <label for="valor-compra">Valor da Nova Compra (R$):</label>
                    <input type="number" id="valor-compra" step="0.01" required placeholder="0.00">
                </div>

                <button type="submit" style="background-color: #2ecc71;">Confirmar e Lançar Compra</button>
                <button type="button" id="btn-limpar" style="background-color: #95a5a6; margin-top: 10px;">Voltar / Nova Busca</button>
            </form>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script src="js/vendedor.js"></script>
</body>
</html>
