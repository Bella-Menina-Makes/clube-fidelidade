<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Conexão</title>
</head>

<body>

<h2>Teste de conexão com Supabase</h2>

<button id="btnTeste">
    Testar conexão
</button>

<p id="resultado"></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>

<script>

document.getElementById("btnTeste").addEventListener("click", async () => {

    const resultado = document.getElementById("resultado");

    try {

        const { error } = await supabaseClient
            .from("clientes")
            .select("id")
            .limit(1);

        if(error){
            resultado.innerHTML = error.message;
        }else{
            resultado.innerHTML = "✅ Conexão com o Supabase realizada com sucesso!";
        }

    } catch (e){

        resultado.innerHTML = e.message;

    }

});

</script>

</body>
</html>
